<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Ladder</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>WORD LADDER</h1>
    <button id="newGameBtn" title="New game">↻ New</button>
  </header>

  <div id="message" class="message"></div>

  <div id="board"></div>

  <div id="keyboard"></div>

  <footer id="instructions">
    <p>Guess the hidden 5-letter word in 6 tries.</p>
    <ul>
      <li><span class="swatch correct"></span> Correct letter, correct spot</li>
      <li><span class="swatch present"></span> Correct letter, wrong spot</li>
      <li><span class="swatch absent"></span> Letter not in the word</li>
    </ul>
  </footer>

  <script src="words.js"></script>
  <script src="script.js"></script>
</body>
</html>
